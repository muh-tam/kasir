<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Mini Portable Pro</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  body { font-family: sans-serif; background: #f5f5f5; margin: 0; padding: 15px; color: #333; }
  .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
  
  .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .header-app h2 { margin: 0; font-size: 18px; }
  
  .tab-container { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; gap: 4px; }
  .tab-button { flex: 1; background: #e0e0e0; color: #555; border: none; padding: 12px 8px; font-weight: bold; cursor: pointer; border-radius: 8px 8px 0 0; transition: all 0.3s ease; font-size: 13px; text-align: center; }
  .tab-button.active { background: #4285f4; color: white; border-bottom: 2px solid #1a73e8; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  button { background: #4285f4; color: white; border: none; padding: 12px 16px; border-radius: 8px; cursor: pointer; margin: 6px 0; font-weight: bold; width: 100%; box-sizing: border-box; font-size: 14px; }
  button.secondary { background: #34a853; }
  button.danger { background: #db4437; width: auto; padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  input { padding: 12px; width: 100%; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
  .hidden { display: none; }
  
  /* BOX KAMERA PORTABLE (Dipindah ke atas agar fleksibel) */
  #cameraArea { background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; }
  #reader { width: 100%; background: #000; }
  .btn-close-cam { background: #db4437; color: white; padding: 8px 12px; font-size: 12px; border: none; border-radius: 6px; cursor: pointer; margin: 10px; width: auto; position: absolute; top: 0; right: 0; z-index: 10; }
  
  .produk, .cart-item { border-bottom: 1px solid #eee; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
  .total { font-size: 24px; font-weight: bold; margin: 15px 0; color: #111; background: #e8f0fe; padding: 12px; border-radius: 8px; text-align: center; }
  .flex-group { display: flex; gap: 8px; align-items: center; }
  .flex-group button { width: auto; white-space: nowrap; margin: 0; height: 45px; }
  small { color: #777; }
  #listProduk { max-height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fafafa; }
</style>
</head>
<body>

<div class="container" id="loginBox">
  <h2>Kasir Mini Portable 🔥</h2>
  <p>Silakan login terlebih dahulu untuk mengelola produk dan transaksi Anda.</p>
  <button onclick="loginGoogle()">Login dengan Google</button>
</div>

<div class="container hidden" id="appBox">
  
  <div class="header-app">
    <h2>Halo, <span id="userName"></span> 👋</h2>
    <button class="danger" onclick="logout()">Logout</button>
  </div>

  <div id="cameraArea" class="hidden">
    <button class="btn-close-cam" onclick="tutupKameraManual()">❌ Tutup Kamera</button>
    <div id="reader"></div>
  </div>

  <div class="tab-container">
    <button class="tab-button active" onclick="switchTab('tabTambah')">1. Tambah Produk</button>
    <button class="tab-button" onclick="switchTab('tabKasir')">2. Scan Barang</button>
    <button class="tab-button" onclick="switchTab('tabBayar')">3. Pembayaran</button>
  </div>

  <div id="tabTambah" class="tab-content active">
    <h3>Tambah / Update Produk</h3>
    <input id="namaProduk" placeholder="Nama Produk">
    <input id="hargaProduk" type="number" placeholder="Harga Jual (Rp)">
    <div class="flex-group">
      <input id="barcodeProduk" placeholder="Barcode / QR Code">
      <button onclick="scanBarcode('barcodeProduk')">📷 Scan</button>
    </div>
    <button class="secondary" onclick="tambahProduk()">Simpan Produk</button>
    
    <div id="listProduk"></div>
  </div>

  <div id="tabKasir" class="tab-content">
    <h3>Kasir (Scan Barang)</h3>
    <button style="background: #1a73e8;" onclick="scanBarcode('scanKasir')">📷 Buka Kamera Scanner</button>
    
    <div class="flex-group" style="margin-top: 10px; margin-bottom: 15px;">
      <input id="manualBarcode" placeholder="Ketik manual jika barcode rusak...">
      <button onclick="tambahManualKasir()">Tambah</button>
    </div>

    <div id="keranjang"></div>
    <div class="total">Total: <span id="totalHarga">Rp0</span></div>
  </div>

  <div id="tabBayar" class="tab-content">
    <h3>Pembayaran & Cetak</h3>
    <div class="total" style="background: #e6f4ea; color: #137333;">Total Tagihan: <span id="totalTagihanTab3">Rp0</span></div>
    
    <input id="bayar" type="number" placeholder="Masukkan Jumlah Uang Tunai (Rp)" oninput="hitungKembalian()">
    
    <div style="font-size: 20px; margin: 20px 0; font-weight: bold; text-align: center; border: 2px dashed #ddd; padding: 15px; border-radius: 8px;">
      Kembalian: <span id="kembalian" style="color: #d93025;">Rp0</span>
    </div>
    <button class="secondary" style="font-size: 16px; padding: 15px;" onclick="simpanTransaksi()">Simpan & Cetak Struk via Alert</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// =========================================================
// PASTIKAN MENGGANTI KODE DI BAWAH INI DENGAN CONFIG KAMU ASLI!
// =========================================================
const firebaseConfig = {
  apiKey: "AIzaSyDrG_WTRHBpFy0jE1qFdKFDIs2AdfYgQzw",
  authDomain: "kasir-mini-portable.firebaseapp.com",
  projectId: "kasir-mini-portable",
  storageBucket: "kasir-mini-portable.firebasestorage.app",
  messagingSenderId: "634322105919",
  appId: "1:634322105919:web:42ddc9f849cd11d0d92a8a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;
let produkCache = [];
let keranjang = [];
let html5QrCode = null;

const formatRupiah = (angka) => "Rp" + Number(angka).toLocaleString('id-ID');

// PERPINDAHAN TAB
window.switchTab = (tabId) => {
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  document.querySelectorAll('.tab-button').forEach(button => button.classList.remove('active'));
  
  document.getElementById(tabId).classList.add('active');
  
  if (window.event && window.event.currentTarget && window.event.currentTarget.classList) {
    window.event.currentTarget.classList.add('active');
  } else {
    const indexBtn = tabId === 'tabTambah' ? 0 : tabId === 'tabKasir' ? 1 : 2;
    const targets = document.querySelectorAll('.tab-button');
    if(targets[indexBtn]) targets[indexBtn].classList.add('active');
  }

  // Matikan kamera otomatis jika pindah ke tab pembayaran
  if (tabId === 'tabBayar') {
    tutupKameraManual();
  }
}

window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider).catch(err => alert(err.message));
}

window.logout = () => {
  tutupKameraManual();
  signOut(auth);
}

onAuthStateChanged(auth, user => {
  if(user){
    userId = user.uid;
    document.getElementById('userName').innerText = user.displayName;
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('appBox').classList.remove('hidden');
    listenProduk();
  } else {
    userId = null;
    produkCache = [];
    keranjang = [];
    document.getElementById('loginBox').classList.remove('hidden');
    document.getElementById('appBox').classList.add('hidden');
  }
});

function listenProduk(){
  const q = query(collection(db, "produk"), where("userId", "==", userId));
  onSnapshot(q, snap => {
    produkCache = [];
    let html = '<h4>List Produk Terdaftar:</h4>';
    snap.forEach(doc => {
      const p = doc.data();
      produkCache.push(p);
      html += `<div class="produk">
        <div><strong>${p.nama}</strong><br><small>${p.barcode}</small></div>
        <div>${formatRupiah(p.harga)}</div>
      </div>`;
    });
    if(produkCache.length === 0) html += '<p style="color:#999"><small>Belum ada produk.</small></p>';
    document.getElementById('listProduk').innerHTML = html;
  });
}

// MANAGEMENT AKTIVASI SCANNER KAMERA
window.scanBarcode = (targetInputId) => {
  document.getElementById('cameraArea').classList.remove('hidden');
  
  if (html5QrCode) {
    html5QrCode.stop().then(() => startScanner(targetInputId)).catch(() => startScanner(targetInputId));
  } else {
    startScanner(targetInputId);
  }
}

function startScanner(targetInputId) {
  html5QrCode = new Html5Qrcode("reader");
  
  // Menggunakan konfigurasi dinamis qrbox agar fleksibel di segala jenis kamera HP
  const qrboxFunction = (viewfinderWidth, viewfinderHeight) => {
    const minEdgePercentage = 0.7;
    const minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
    const qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
    return { width: qrboxSize, height: Math.floor(qrboxSize * 0.6) };
  };

  html5QrCode.start(
    { facingMode: "environment" }, 
    { fps: 15, qrbox: qrboxFunction },
    barcode => {
      document.getElementById(targetInputId).value = barcode;
      
      // Mengeluarkan bunyi getar pendek jika didukung HP (umpan balik berhasil scan)
      if (navigator.vibrate) navigator.vibrate(100);

      tutupKameraManual();
      
      if(targetInputId === 'scanKasir') {
        tambahKeKeranjang(barcode);
      }
    },
    error => { /* Proses scanning berjalan mencari target... */ }
  ).catch(err => {
    alert("Gagal mengakses kamera! Pastikan izin kamera di browser sudah diberikan.");
    document.getElementById('cameraArea').classList.add('hidden');
  });
}

window.tutupKameraManual = () => {
  document.getElementById('cameraArea').classList.add('hidden');
  if (html5QrCode) {
    html5QrCode.stop().catch(()=>{});
  }
}

window.tambahProduk = async () => {
  const nama = document.getElementById('namaProduk').value.trim();
  const harga = Number(document.getElementById('hargaProduk').value);
  const barcode = document.getElementById('barcodeProduk').value.trim();
  
  if(!nama || !harga || !barcode) return alert('Lengkapi data produk!');
  
  const cekDuplikat = produkCache.find(p => p.barcode === barcode);
  if(cekDuplikat) return alert(`Barcode sudah digunakan oleh produk: ${cekDuplikat.nama}`);

  try {
    await addDoc(collection(db, "produk"), { userId, nama, harga, barcode });
    alert('Produk berhasil disimpan!');
    document.getElementById('namaProduk').value = '';
    document.getElementById('hargaProduk').value = '';
    document.getElementById('barcodeProduk').value = '';
  } catch (error) {
    alert('Gagal menyimpan ke Firebase: ' + error.message);
  }
}

window.tambahManualKasir = () => {
  const input = document.getElementById('manualBarcode');
  if(!input.value.trim()) return;
  tambahKeKeranjang(input.value.trim());
  input.value = '';
}

function tambahKeKeranjang(barcode){
  const produk = produkCache.find(p => p.barcode === barcode);
  if(!produk) return alert('Produk tidak ditemukan! Daftarkan dulu di Tab 1.');
  
  const itemIndex = keranjang.findIndex(item => item.barcode === barcode);
  if(itemIndex > -1) {
    keranjang[itemIndex].qty += 1;
  } else {
    keranjang.push({ barcode: produk.barcode, nama: produk.nama, harga: produk.harga, qty: 1 });
  }
  renderKeranjang();
}

function renderKeranjang(){
  let html = '<h4>Keranjang Belanja:</h4>';
  let total = 0;
  keranjang.forEach((item, i) => {
    const subtotal = item.harga * item.qty;
    total += subtotal;
    html += `<div class="cart-item">
      <div><strong>${item.nama}</strong> <small>(${item.qty}x)</small><br><small>${formatRupiah(item.harga)}</small></div>
      <div><span style="margin-right:10px; font-weight:bold;">${formatRupiah(subtotal)}</span><button class="danger" onclick="hapusItem(${i})">X</button></div>
    </div>`;
  });
  if(keranjang.length === 0) html += '<p style="color:#999"><small>Keranjang kosong.</small></p>';
  document.getElementById('keranjang').innerHTML = html;
  
  document.getElementById('totalHarga').innerText = formatRupiah(total);
  document.getElementById('totalTagihanTab3').innerText = formatRupiah(total);
  hitungKembalian();
}

window.hapusItem = (index) => {
  if(keranjang[index].qty > 1) {
    keranjang[index].qty -= 1;
  } else {
    keranjang.splice(index, 1);
  }
  renderKeranjang();
}

window.hitungKembalian = () => {
  const total = keranjang.reduce((acc, item) => acc + (item.harga * item.qty), 0);
  const bayar = Number(document.getElementById('bayar').value) || 0;
  const selisih = bayar - total;
  document.getElementById('kembalian').innerText = formatRupiah(selisih >= 0 ? selisih : 0);
}

window.simpanTransaksi = async () => {
  if(keranjang.length === 0) return alert('Keranjang masih kosong!');
  const total = keranjang.reduce((acc, item) => acc + (item.harga * item.qty), 0);
  const bayar = Number(document.getElementById('bayar').value);
  if(bayar < total) return alert('Uang pembayaran kurang!');
  
  try {
    await addDoc(collection(db, "penjualan"), { userId, items: keranjang, total, bayar, kembalian: bayar - total, waktu: serverTimestamp() });
    let strukText = `=== STRUK PEMBAYARAN ===\n\n`;
    keranjang.forEach(item => { strukText += `${item.nama} x${item.qty} : ${formatRupiah(item.harga * item.qty)}\n`; });
    strukText += `\n-----------------------\nTotal: ${formatRupiah(total)}\nBayar: ${formatRupiah(bayar)}\nKembalian: ${formatRupiah(bayar - total)}\n\nSukses!`;
    alert(strukText);
    keranjang = [];
    document.getElementById('bayar').value = '';
    renderKeranjang();
    
    switchTab('tabKasir');
  } catch (error) {
    alert("Gagal menyimpan transaksi: " + error.message);
  }
}
</script>
</body>
</html>
